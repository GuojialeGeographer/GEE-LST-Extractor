# Conda环境配置文件
# 使用方法: conda env create -f environment.yml

name: geelst
channels:
  - conda-forge
  - defaults

dependencies:
  # Python版本
  - python=3.12

  # 核心科学计算
  - numpy>=1.21.0
  - pandas>=1.3.0

  # Google Earth Engine
  - earthengine-api>=0.1.300

  # Jupyter
  - jupyter>=1.0.0
  - ipykernel>=6.0.0

  # 可视化（可选）
  - matplotlib>=3.4.0
  - seaborn>=0.11.0

  # 工具
  - tqdm>=4.62.0

  # Pip包
  - pip>=21.0
  - pip:
      - geemap>=0.1.250
